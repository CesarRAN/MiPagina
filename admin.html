<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Blog | Cesar Altamirano</title>
  <link href="css/output.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
  <link href="css/blog.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css">
  <script src="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.js"></script>
</head>
<body class="bg-dark-900 text-dark-50">
  <div class="min-h-screen">
    <nav class="bg-dark-800/90 backdrop-blur-md border-b border-dark-400/30 p-4">
      <div class="max-w-6xl mx-auto flex items-center justify-between">
        <h1 class="text-xl font-bold gradient-text">Admin Blog</h1>
        <div class="flex items-center gap-4">
          <a href="blog.html" class="text-dark-100 hover:text-lime-500 transition-colors">Ver Blog</a>
          <a href="index.html" class="text-dark-100 hover:text-lime-500 transition-colors">Volver al sitio</a>
          <button id="logout-btn" class="btn-outline text-sm px-3 py-1">Cerrar sesión</button>
        </div>
      </div>
    </nav>

    <div id="login-view" class="max-w-md mx-auto mt-20 p-8 glass-card">
      <h2 class="text-2xl font-bold text-center mb-6 gradient-text">Admin Blog</h2>
      <p class="text-dark-100 text-center mb-8">Inicia sesión para gestionar entradas</p>
      <div class="space-y-4">
        <a href="/auth/google" class="flex items-center justify-center gap-3 w-full py-3 bg-dark-500/50 border border-dark-400/30 rounded-xl hover:bg-dark-500 transition-all duration-300">
          <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.15-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.85 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          <span>Continuar con Google</span>
        </a>
        <a href="/auth/github" class="flex items-center justify-center gap-3 w-full py-3 bg-dark-500/50 border border-dark-400/30 rounded-xl hover:bg-dark-500 transition-all duration-300">
          <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
          <span>Continuar con GitHub</span>
        </a>
      </div>
    </div>

    <div id="dashboard-view" class="hidden max-w-6xl mx-auto p-6">
      <div class="flex items-center justify-between mb-8">
        <h2 class="text-2xl font-bold">Dashboard</h2>
        <button id="new-post-btn" class="btn-primary">Nueva Entrada</button>
      </div>

      <div id="posts-list" class="space-y-4">
      </div>
    </div>

    <div id="editor-view" class="hidden max-w-6xl mx-auto p-6">
      <div class="flex items-center justify-between mb-6">
        <h2 id="editor-title" class="text-2xl font-bold">Nueva Entrada</h2>
        <button id="back-btn" class="btn-outline text-sm">Volver al Dashboard</button>
      </div>

      <form id="post-form" class="space-y-6">
        <input type="hidden" id="post-id" value="">
        
        <div>
          <label class="block text-sm font-medium text-dark-100 mb-2">Título</label>
          <input type="text" id="post-title" class="input-field" required>
        </div>

        <div>
          <label class="block text-sm font-medium text-dark-100 mb-2">Slug (URL)</label>
          <input type="text" id="post-slug" class="input-field" required>
          <p class="text-xs text-dark-200 mt-1">Se genera automáticamente desde el título</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-dark-100 mb-2">Imagen de portada</label>
          <div class="flex items-center gap-4">
            <input type="file" id="cover-upload" accept="image/*" class="hidden">
            <button type="button" id="upload-btn" class="btn-outline text-sm">Subir imagen</button>
            <img id="cover-preview" class="h-20 w-32 object-cover rounded-lg hidden" alt="">
            <input type="hidden" id="cover-image" value="">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-dark-100 mb-2">Tags (separados por coma)</label>
          <input type="text" id="post-tags" class="input-field" placeholder="data-science, python, machine-learning">
        </div>

        <div>
          <label class="block text-sm font-medium text-dark-100 mb-2">Excerpt (resumen)</label>
          <textarea id="post-excerpt" class="input-field" rows="2"></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium text-dark-100 mb-2">Contenido (Markdown)</label>
          <textarea id="post-content" class="input-field"></textarea>
        </div>

        <div class="flex items-center gap-4">
          <select id="post-status" class="input-field w-auto">
            <option value="draft">Borrador</option>
            <option value="published">Publicado</option>
          </select>
          <button type="submit" class="btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
